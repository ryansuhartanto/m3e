on: [push, pull_request]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest

      - run: npm install
      - run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            packages/web/dist
            packages/react/dist
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: packages

      - run: npx pkg-pr-new publish './packages/web' './packages/react'
